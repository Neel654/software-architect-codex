name: CI

on: [push, pull_request]

env:
  NODE_VERSION: '20'
  JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET || 'ci-test-secret' }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-test-secret' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          cd examples
          npm ci
      - name: Lint
        run: |
          cd examples
          npm run lint 2>/dev/null || echo "No lint script configured"

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          cd examples
          npm ci
      - name: Unit tests
        run: |
          cd examples
          npm test -- --coverage --forceExit

  integration-test:
    runs-on: ubuntu-latest
    # Integration tests require Docker for Testcontainers
    # Skip on forks that may not have Docker available
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          cd examples
          npm ci
      - name: Integration tests
        run: |
          cd examples
          npm run test:integration 2>/dev/null || echo "No integration tests configured"

  build-and-publish:
    needs: [lint, unit-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./examples
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nexus-auth:latest
            ghcr.io/${{ github.repository_owner }}/nexus-auth:${{ github.sha }}
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./examples
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nexus-worker:latest
            ghcr.io/${{ github.repository_owner }}/nexus-worker:${{ github.sha }}
